<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <!-- Diamond border gradient -->
    <linearGradient id="diamondBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B9EFF"/>
      <stop offset="100%" stop-color="#B06EFF"/>
    </linearGradient>
    <!-- Subtle inner glow for diamond -->
    <linearGradient id="diamondFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#060614"/>
    </linearGradient>
    <!-- Wordmark divider gradient -->
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B9EFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7B9EFF"/>
      <stop offset="70%" stop-color="#B06EFF"/>
      <stop offset="100%" stop-color="#B06EFF" stop-opacity="0"/>
    </linearGradient>
    <!-- LV monogram gradient -->
    <linearGradient id="monogramGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B9EFF"/>
      <stop offset="100%" stop-color="#B06EFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#040412"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- ICON: Centered Diamond                 -->
  <!-- ═══════════════════════════════════════ -->
  <g id="icon">
    <!-- Diamond border (slightly larger, provides the gradient border effect) -->
    <rect
      x="300" y="60"
      width="164" height="164"
      rx="6" ry="6"
      transform="rotate(45, 300, 142)"
      fill="url(#diamondBorder)"
    />
    <!-- Diamond interior (inset to create border thickness) -->
    <rect
      x="300" y="66"
      width="152" height="152"
      rx="4" ry="4"
      transform="rotate(45, 300, 142)"
      fill="url(#diamondFill)"
    />

    <!-- LV Monogram — geometric, thick strokes -->
    <!-- Strategy: L on left, V on right, integrated and centered -->
    <!-- Combined center: x=300, y=142 -->
    <!-- L: vertical stroke + horizontal base -->
    <!-- V: two diagonal strokes meeting at a point -->

    <!-- L — left portion -->
    <!-- Vertical stroke of L -->
    <line
      x1="264" y1="112"
      x2="264" y2="172"
      stroke="url(#monogramGrad)" stroke-width="20" stroke-linecap="round"
    />
    <!-- Horizontal base of L -->
    <line
      x1="264" y1="172"
      x2="294" y2="172"
      stroke="url(#monogramGrad)" stroke-width="20" stroke-linecap="round"
    />

    <!-- V — right portion -->
    <!-- Left diagonal of V (starts near top-center, descends to point) -->
    <line
      x1="298" y1="112"
      x2="318" y2="172"
      stroke="url(#monogramGrad)" stroke-width="20" stroke-linecap="round"
    />
    <!-- Right diagonal of V -->
    <line
      x1="338" y1="112"
      x2="318" y2="172"
      stroke="url(#monogramGrad)" stroke-width="20" stroke-linecap="round"
    />
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- WORDMARK: Stacked below icon           -->
  <!-- ═══════════════════════════════════════ -->
  <g id="wordmark">
    <!-- "LEE VILLARASA" — uppercase serif, large, centered -->
    <text
      x="300" y="316"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="36"
      font-weight="400"
      letter-spacing="7"
      fill="#E8ECFF"
      text-anchor="middle"
      dominant-baseline="auto"
    >LEE VILLARASA</text>

    <!-- Thin gradient divider line -->
    <line
      x1="145" y1="334"
      x2="455" y2="334"
      stroke="url(#dividerGrad)"
      stroke-width="1"
    />

    <!-- "OPERATIONS ARCHITECT" — tiny tracked uppercase sans-serif -->
    <text
      x="300" y="362"
      font-family="Arial, Helvetica, sans-serif"
      font-size="11"
      font-weight="400"
      letter-spacing="4.5"
      fill="#7880AA"
      text-anchor="middle"
      dominant-baseline="auto"
    >OPERATIONS ARCHITECT</text>
  </g>
</svg>
