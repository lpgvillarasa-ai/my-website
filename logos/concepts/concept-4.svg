<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <defs>
    <!-- Badge background gradient -->
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0B1A"/>
      <stop offset="100%" stop-color="#070814"/>
    </linearGradient>

    <!-- Badge border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B9EFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#B06EFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7B9EFF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- LV mark gradient — blue to violet -->
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B9EFF"/>
      <stop offset="100%" stop-color="#B06EFF"/>
    </linearGradient>

    <!-- Villarasa name gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B9EFF"/>
      <stop offset="100%" stop-color="#B06EFF"/>
    </linearGradient>

    <!-- Glow filter for the mark -->
    <filter id="markGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.482
                0 0 0 0 0.620
                0 0 0 0 1
                0 0 0 0.6 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded badge -->
    <clipPath id="badgeClip">
      <rect x="40" y="96" width="320" height="320" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="1024" height="512" fill="#040412"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ICON — square badge with L+V mark           -->
  <!-- ═══════════════════════════════════════════ -->
  <g id="icon">
    <!-- Border ring (slightly larger rect behind) -->
    <rect x="38" y="94" width="324" height="324" rx="30" ry="30"
          fill="none" stroke="url(#borderGrad)" stroke-width="2.5"/>

    <!-- Badge fill -->
    <rect x="40" y="96" width="320" height="320" rx="28" ry="28"
          fill="url(#badgeBg)"/>

    <!-- Subtle inner vignette -->
    <rect x="40" y="96" width="320" height="320" rx="28" ry="28"
          fill="none" stroke="#7B9EFF" stroke-width="0.5" stroke-opacity="0.15"/>

    <!--
      L+V Composite Mark — geometric paths sharing a unified diagonal.

      Concept:
        The L and V interlock along a shared left diagonal.
        The L: vertical stroke descending down-left, then a horizontal foot
               extending right — but its vertical is also the V's left arm.
        The V: left arm shared with L's vertical (same angle), right arm
               diverging up-right, forming the closing apex at the bottom.

      Layout center: (200, 256) within the 320×320 badge.
      The mark occupies roughly 180×200 px, centered.

      Key points (absolute coords):
        The shared diagonal stroke runs from top-left to bottom-center.
        Top-left anchor: (110, 130)
        Apex (bottom center of V / foot corner of L): (200, 340)
        L horizontal foot: runs right from apex to (290, 340)
        L horizontal top cap: runs right from top anchor to (170, 130)
          (short cap on top of L's vertical — subtle)
        V right arm: from apex (200,340) up-right to (290, 130)

      Stroke approach: filled paths for thick, bold geometry.
      Stroke width equivalent: ~18px
    -->

    <!-- Shared diagonal / L vertical + V left arm:
         A thick parallelogram strip from (110,130) down to (200,340),
         with stroke width ~18 → offset perpendicular to the angle.

         Angle of diagonal: atan2(340-130, 200-110) = atan2(210,90) ≈ 66.8°
         Perpendicular direction: ~(-0.92, 0.39) normalized
         Offset by 9px each side.
    -->

    <g filter="url(#markGlow)">
      <!-- Filled path version for crisp bold geometry -->

      <!--
        Building the composite as a single unified path:

        The mark reads as:
          1. Top-left diagonal arm (shared L+V): (110,130) → (200,340)
          2. V right arm: (200,340) → (290,130)
          3. L horizontal foot: (200,340) → (290,340)
          4. L top horizontal cap: (110,130) → (170,130)

        Rendered as thick strokes with round joins, using polyline/path.

        Using stroke-based approach for clean anti-aliasing:
      -->

      <!-- V right arm (thinner, elegant) -->
      <line x1="200" y1="342"
            x2="292" y2="128"
            stroke="url(#markGrad)"
            stroke-width="19"
            stroke-linecap="square"/>

      <!-- Shared diagonal: L vertical + V left arm -->
      <line x1="108" y1="128"
            x2="200" y2="342"
            stroke="url(#markGrad)"
            stroke-width="19"
            stroke-linecap="square"/>

      <!-- L horizontal foot — extends right from apex -->
      <line x1="196" y1="342"
            x2="292" y2="342"
            stroke="url(#markGrad)"
            stroke-width="19"
            stroke-linecap="square"/>

      <!-- L top cap — short horizontal at top of vertical -->
      <line x1="108" y1="128"
            x2="174" y2="128"
            stroke="url(#markGrad)"
            stroke-width="19"
            stroke-linecap="square"/>

      <!-- Junction accent: small bright node at the apex (200,342)
           to reinforce the convergence point -->
      <circle cx="200" cy="342" r="5"
              fill="#B06EFF" fill-opacity="0.9"/>

      <!-- Motion accent: thin velocity slash behind the mark -->
      <line x1="148" y1="96" x2="252" y2="416"
            stroke="#7B9EFF" stroke-width="1"
            stroke-opacity="0.12" stroke-linecap="butt"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- WORDMARK — name + rule + tagline            -->
  <!-- ═══════════════════════════════════════════ -->
  <g id="wordmark" transform="translate(400, 0)">

    <!-- "LEE" — smaller, lighter, white -->
    <text x="0" y="226"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="42"
          font-weight="400"
          letter-spacing="10"
          fill="#E8ECFF"
          fill-opacity="0.72">LEE</text>

    <!-- "VILLARASA" — larger, bold, blue-to-violet gradient -->
    <text x="0" y="300"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="74"
          font-weight="700"
          letter-spacing="4"
          fill="url(#nameGrad)">VILLARASA</text>

    <!-- Thin horizontal rule separator -->
    <line x1="0" y1="320" x2="572" y2="320"
          stroke="#7B9EFF" stroke-width="0.75" stroke-opacity="0.35"/>

    <!-- "OPERATIONS ARCHITECT" — tiny tracked caps, sans-serif -->
    <text x="2" y="347"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          font-weight="400"
          letter-spacing="5.5"
          fill="#7B9EFF"
          fill-opacity="0.75">OPERATIONS ARCHITECT</text>

  </g>

</svg>
