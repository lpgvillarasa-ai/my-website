<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A2A"/>
      <stop offset="100%" stop-color="#06061A"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B9EFF"/>
      <stop offset="100%" stop-color="#B06EFF"/>
    </linearGradient>
    <radialGradient id="apex" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#C8B8FF"/>
      <stop offset="100%" stop-color="#9480FF"/>
    </radialGradient>
  </defs>
  <!-- Badge -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="8.5" fill="none" stroke="url(#fg)" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- Lines: L vertical, L foot, V left arm, V right arm -->
  <line x1="9" y1="9" x2="9" y2="30" stroke="url(#fg)" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="9" y1="30" x2="16" y2="30" stroke="url(#fg)" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="20" y1="9" x2="25" y2="30" stroke="url(#fg)" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="31" y1="9" x2="25" y2="30" stroke="url(#fg)" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Cross-connections -->
  <line x1="9" y1="9" x2="20" y2="9" stroke="url(#fg)" stroke-width="0.6" stroke-linecap="round" stroke-opacity="0.3"/>
  <line x1="16" y1="30" x2="25" y2="30" stroke="url(#fg)" stroke-width="0.6" stroke-linecap="round" stroke-opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="9" cy="9" r="2.2" fill="#7B9EFF" fill-opacity="0.25"/>
  <circle cx="9" cy="9" r="1.3" fill="#A8C4FF"/>
  <circle cx="9" cy="30" r="1.8" fill="#B06EFF" fill-opacity="0.25"/>
  <circle cx="9" cy="30" r="1.1" fill="#D0A8FF"/>
  <circle cx="16" cy="30" r="1.6" fill="#B06EFF" fill-opacity="0.2"/>
  <circle cx="16" cy="30" r="1" fill="#D0A8FF"/>
  <circle cx="20" cy="9" r="2.2" fill="#7B9EFF" fill-opacity="0.25"/>
  <circle cx="20" cy="9" r="1.3" fill="#A8C4FF"/>
  <circle cx="25" cy="30" r="3" fill="#9480FF" fill-opacity="0.3"/>
  <circle cx="25" cy="30" r="1.8" fill="url(#apex)"/>
  <circle cx="31" cy="9" r="2.2" fill="#7B9EFF" fill-opacity="0.25"/>
  <circle cx="31" cy="9" r="1.3" fill="#A8C4FF"/>
</svg>
